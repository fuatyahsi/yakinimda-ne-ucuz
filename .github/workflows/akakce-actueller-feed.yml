name: Market Actueller Feed
# Trigger note: keep this workflow easy to retrigger with tiny non-functional edits.
# Debug rerun marker: 2

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Brochure source"
        required: false
        default: "bim"
        type: choice
        options:
          - bim
          - akakce
      listing_url:
        description: "Optional override listing URL"
        required: false
        default: ""
        type: string
      upload_artifacts:
        description: "Upload JSON artifacts"
        required: false
        default: false
        type: boolean
      seed_urls:
        description: "Optional brochure detail or direct CDN image URLs, one per line"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/akakce-actueller-feed.yml"
      - "tools/akakce_worker/**"
  schedule:
    - cron: "0 5 * * *"

jobs:
  build-actueller-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install worker dependencies
        run: |
          pip install -r tools/akakce_worker/requirements.txt
          pip install -r tools/akakce_worker/requirements-ocr.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Write seed URLs
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.seed_urls != '' }}
        shell: bash
        run: |
          mkdir -p tools/akakce_worker/input
          cat <<'EOF' > tools/akakce_worker/input/seed_urls.txt
          ${{ github.event.inputs.seed_urls }}
          EOF

      - name: Verify OCR runtime imports
        run: |
          python -c "import onnxruntime; print('onnxruntime', onnxruntime.__version__)"
          python -c "from rapidocr import RapidOCR; print('rapidocr ok')"
          python -c "from playwright.sync_api import sync_playwright; print('playwright ok')"

      - name: Resolve worker inputs
        shell: bash
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          LISTING_URL="${{ github.event.inputs.listing_url }}"
          if [ -z "$SOURCE" ]; then
            SOURCE="bim"
          fi
          echo "WORKER_SOURCE=$SOURCE" >> "$GITHUB_ENV"
          echo "WORKER_LISTING_URL=$LISTING_URL" >> "$GITHUB_ENV"

      - name: Run market worker pipeline
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [ -n "$WORKER_LISTING_URL" ]; then
            EXTRA_ARGS+=(--listing-url "$WORKER_LISTING_URL")
          fi
          python tools/akakce_worker/run_pipeline.py --source "$WORKER_SOURCE" --max-brochures 24 --download-images --extract-items "${EXTRA_ARGS[@]}"

      - name: Print worker summary
        if: always()
        run: python tools/akakce_worker/print_summary.py

      - name: Validate BİM fixtures
        if: ${{ success() && env.WORKER_SOURCE == 'bim' }}
        run: |
          python tools/akakce_worker/validate_all_fixtures.py --source "$WORKER_SOURCE" --min-coverage 1.0

      - name: Upload worker JSON outputs
        if: ${{ always() && github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifacts == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: akakce-actueller-feed
          path: |
            tools/akakce_worker/output/source_manifest.json
            tools/akakce_worker/output/tile_manifest.json
            tools/akakce_worker/output/extracted_products.json
            tools/akakce_worker/output/actueller_feed.json
          if-no-files-found: warn

