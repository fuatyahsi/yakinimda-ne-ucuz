name: Android Build

on:
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: "Upload build artifacts"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-build.yml"
      - "android/**"
      - "assets/**"
      - "lib/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "test/**"

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test test/widget_test.dart test/smart_kitchen_test.dart test/recipe_catalog_test.dart test/recipe_amount_test.dart

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifacts == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: fridgechef-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Prepare Android release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' && env.ANDROID_STORE_PASSWORD != '' }}
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' && env.ANDROID_STORE_PASSWORD != '' }}
        run: flutter build apk --release

      - name: Build release AAB
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' && env.ANDROID_STORE_PASSWORD != '' }}
        run: flutter build appbundle --release

      - name: Upload release APK artifact
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' && env.ANDROID_STORE_PASSWORD != '' && github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifacts == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: fridgechef-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' && env.ANDROID_STORE_PASSWORD != '' && github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifacts == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: fridgechef-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Release signing not configured
        if: ${{ !(env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' && env.ANDROID_STORE_PASSWORD != '') }}
        run: echo "Release APK/AAB skipped because Android signing secrets are not configured."
