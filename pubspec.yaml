name: yakinimda_en_ucuz
description: "Yakindaki market ve kozmetik magazalarinda ayni urunun en uygun fiyatini karsilastiran uygulama"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.1
  mobile_scanner: ^6.0.2
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/market_logo.png
  min_sdk_android: 21
  remove_alpha_ios: true
